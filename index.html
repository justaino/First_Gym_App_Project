<!DOCTYPE html>
<!--
  index.html — the single page for the Gym App.
  Phase 0: just a styled shell so we can confirm the look.
  No real features yet (that's Phase 1).
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Makes the page size correctly on phones -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym App</title>

    <!-- Load the Nunito font from Google Fonts (a <link> font is allowed). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Our own styles -->
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <!-- The main app area. Content scrolls here; the tab bar floats on top. -->
    <main class="app">
      <!-- Phase 0 sample card, just to confirm the design system looks right. -->
      <section class="card">
        <h1 class="card__title">Gym App</h1>
        <p class="card__subtitle">Phase 0 — setup complete 💪</p>
      </section>
    </main>

    <!--
      Floating bottom tab bar (placeholder).
      Four tabs; the active one is tinted. These don't do anything yet.
    -->
    <nav class="tabbar" aria-label="Main navigation">
      <!-- aria-current marks the active tab for screen readers. -->
      <button class="tab tab--active" type="button" aria-current="page">
        <span class="tab__icon" aria-hidden="true">☀️</span>
        <span class="tab__label">Today</span>
      </button>

      <button class="tab" type="button">
        <span class="tab__icon" aria-hidden="true">📅</span>
        <span class="tab__label">Schedule</span>
      </button>

      <button class="tab" type="button">
        <span class="tab__icon" aria-hidden="true">📈</span>
        <span class="tab__label">Progress</span>
      </button>

      <button class="tab" type="button">
        <span class="tab__icon" aria-hidden="true">⚙️</span>
        <span class="tab__label">Settings</span>
      </button>
    </nav>

    <!-- Our app logic -->
    <script src="app.js"></script>
  </body>
</html>
